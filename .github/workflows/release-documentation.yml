# Workflow to build doc, and deploy it using the version as a subdomain.
#
# To run this check locally from the `doc` folder:
#
# .. code-block:: bash
#
#   $ sphinxdoc -v 2 -p $MODULE_DIR -n $MODULE_NAME -o $MODULE_DIR/doc
#   $ cd $MODULE_DIR/doc
#   $ make html-strict
###
name: "DocumentationRelease"

on:
  workflow_dispatch:

env:
    MIN_PYTHON_VERSION: "3.12"

jobs:

  build_and_deploy:

    runs-on: "ubuntu-latest"
    strategy:
      fail-fast: false

    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        fetch-depth: 0
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.MIN_PYTHON_VERSION }}
        cache: "pip"
    - name: Install apt packages
      run: |
        sudo -E apt-get -yq update
        sudo -E apt-get -yq --no-install-suggests --no-install-recommends install \
            dvipng texlive-latex-base texlive-latex-extra
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --progress-bar off .
    - name: Extract module version
      shell: python
      run: |
        import os
        import pysphinxdoc
        with open(os.environ["GITHUB_OUTPUT"], "a") as of:
          of.write(f"version={pysphinxdoc.__version__}")
      id: extract_version
    - name: Compute documentation
      run: |
        DIR=$(pwd)
        sphinxdoc -v 2 -p $DIR -n pysphinxdoc -o $DIR/doc
        cd $DIR/doc
        make html-strict
        cd $DIR
    - name: Upload documentation as an artifact
      uses: actions/upload-artifact@v4
      with: 
        name: html-documentation
        retention-days: 1
        path: |
            doc/build/html
    - name: Deploy
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: doc/build/html
        destination_dir: ${{ steps.extract_version.outputs.version }}
